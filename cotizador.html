<script>

/* BASE DE PRECIOS */

const precios={

"San José":2500,
"Montes de Oca":2500,
"Tibás":2500,
"Santa Ana":2500,
"Curridabat":3000,
"Goicoechea":3000,
"Moravia":3000,
"Escazú":3000,
"Alajuelita":3000,
"Desamparados":3000,
"Vázquez de Coronado":4000,
"Aserrí":4000,

"Mora":"ruta",
"Acosta":"ruta",
"Puriscal":"ruta",
"Turrubares":"ruta",
"Dota":"ruta",
"Tarrazú":"ruta",
"León Cortés Castro":"ruta",
"Pérez Zeledón":"ruta",

"Heredia":2500,
"Flores":2500,
"Belén":2500,
"Santa Bárbara":2500,
"Barva":2500,
"San Pablo":2500,
"Santo Domingo":2500,
"San Rafael":2500,
"San Isidro":3000,
"Sarapiquí":"ruta",

"Alajuela":2500,
"Poás":3000,
"Grecia":4000,
"Sarchí":4000,
"Atenas":5000,
"Naranjo":5000,
"Palmares":5000,

"San Mateo":"ruta",
"Orotina":"ruta",
"Zarcero":"ruta",
"San Ramón":"ruta",
"Río Cuarto":"ruta",
"San Carlos":"ruta",
"Guatuso":"ruta",
"Los Chiles":"ruta",
"Upala":"ruta",

"Cartago":4500,
"La Unión":4500,
"Paraíso":4500,
"Oreamuno":4500,

"El Guarco":"ruta",
"Alvarado":"ruta",
"Jiménez":"ruta",
"Turrialba":"ruta",

"Liberia":5000,
"Bagaces":5000,
"Carrillo":5000,
"Cañas":7000,
"Tilarán":7000,
"Abangares":5000,
"La Cruz":7000,
"Nicoya":5000,
"Santa Cruz":5000,
"Nandayure":7000,
"Hojancha":7000

};



function calcular(){

let canton=document.getElementById("canton").value;
let cantidad=parseInt(document.getElementById("cantidad").value)||0;

if(!canton)return;

let precio=precios[canton];

if(precio==="ruta"){

document.getElementById("precio").innerText="Contacte a Axis MC Logística";
document.getElementById("total").innerText="-";

document.getElementById("whatsappBtn").href="https://wa.me/50664541075?text=Hola%20Axis%20MC%20Logística,%20quiero%20cotizar%20envío%20a%20"+canton;

return;

}

document.getElementById("precio").innerText=precio.toLocaleString();
document.getElementById("total").innerText=(precio*cantidad).toLocaleString();

document.getElementById("whatsappBtn").href="https://wa.me/50664541075?text=Hola%20Axis%20MC%20Logística,%20quiero%20cotizar%20"+cantidad+"%20envíos%20a%20"+canton;

}

document.getElementById("canton").addEventListener("change",calcular);
document.getElementById("cantidad").addEventListener("input",calcular);

</script>
