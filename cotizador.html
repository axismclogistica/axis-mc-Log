<script>

/* PRECIOS CANTONES */

const cantones={

"Pérez Zeledón":"ruta",

"Heredia":2500,

"Santa Bárbara":2500,
"Barva":2500,
"San Pablo":2500,
"Santo Domingo":2500,
"San Rafael":2500,
"San Isidro":3000,
"Sarapiquí":"ruta",

"Alajuela":2500,
"Poás":3000,
"Grecia":4000,
"Sarchí":4000,
"Atenas":5000,
"Naranjo":5000,
"Palmares":5000,

"San Mateo":"ruta",

"San Carlos":"ruta",

"El Guarco":"ruta",
"Alvarado":"ruta",

"Turrialba":"ruta",

"Liberia":5000,

"Carrillo":5000,
"Cañas":7000,
"Tilarán":7000,
"Abangares":5000,
"La Cruz":7000,
"Nicoya":5000,
"Santa Cruz":5000,
"Nandayure":7000,
"Hojancha":7000

};


/* PRECIOS PROVINCIAS */

function precioProvincia(provincia,cantidad){

if(provincia==="Limon"){
if(cantidad>=31)return 2800;
if(cantidad>=26)return 3000;
if(cantidad>=16)return 3500;
if(cantidad>=10)return 4000;
}

if(provincia==="Guanacaste"){
if(cantidad>=31)return 4200;
if(cantidad>=26)return 4500;
if(cantidad>=16)return 5000;
if(cantidad>=10)return 5500;
}

if(provincia==="Puntarenas"){
if(cantidad>=31)return 3200;
if(cantidad>=26)return 3500;
if(cantidad>=16)return 4000;
if(cantidad>=10)return 4500;
}

return null;

}


function calcular(){

let canton=document.getElementById("canton").value;
let provincia=document.getElementById("provincia").value;
let cantidad=parseInt(document.getElementById("cantidad").value)||1;

let precio=null;


/* SI HAY CANTON */

if(canton){

precio=cantones[canton];

if(precio==="ruta"){

document.getElementById("precio").innerText="Contacte a Axis MC Logística";
document.getElementById("total").innerText="-";

document.getElementById("whatsappBtn").href="https://wa.me/50664541075?text=Hola%20quiero%20cotizar%20envío%20a%20"+encodeURIComponent(canton);

return;

}

}


/* SI USA PROVINCIA */

if(!precio && provincia){

precio=precioProvincia(provincia,cantidad);

}

if(!precio)return;

document.getElementById("precio").innerText=precio.toLocaleString();
document.getElementById("total").innerText=(precio*cantidad).toLocaleString();

document.getElementById("whatsappBtn").href="https://wa.me/50664541075?text=Hola%20quiero%20cotizar%20"+cantidad+"%20envíos";

}

document.getElementById("canton").addEventListener("change",calcular);
document.getElementById("provincia").addEventListener("change",calcular);
document.getElementById("cantidad").addEventListener("input",calcular);

</script>
