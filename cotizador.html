<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cotizador Axis MC Logística</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#0c0f14;
color:white;
display:flex;
justify-content:center;
padding:30px;
}

.container{
background:#1f2937;
padding:40px;
border-radius:15px;
width:100%;
max-width:650px;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

.logo{
display:block;
margin:auto;
width:180px;
margin-bottom:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
}

select,input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-top:5px;
}

.resultado{
margin-top:20px;
font-size:18px;
}

.whatsapp{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#25D366;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.formulario{
margin-top:40px;
border-top:1px solid #374151;
padding-top:30px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<img class="logo"
src="https://github.com/axismclogistica/axis-mc-logistica/blob/main/Logo%20Axismc.png?raw=true">

<h1>Cotizador Axis MC Logística</h1>

<label>Cantón</label>

<select id="canton">

<option value="">Seleccione cantón</option>
<option>San José</option>
<option>Montes de Oca</option>
<option>Tibás</option>
<option>Santa Ana</option>
<option>Curridabat</option>
<option>Goicoechea</option>
<option>Moravia</option>
<option>Escazú</option>
<option>Alajuelita</option>
<option>Desamparados</option>
<option>Vázquez de Coronado</option>
<option>Aserrí</option>
<option>Heredia</option>
<option>Flores</option>
<option>Belén</option>
<option>Santa Bárbara</option>
<option>Barva</option>
<option>San Pablo</option>
<option>Santo Domingo</option>
<option>San Rafael</option>
<option>Alajuela</option>
<option>Poás</option>
<option>Grecia</option>
<option>Sarchí</option>
<option>Atenas</option>
<option>Naranjo</option>
<option>Palmares</option>
<option>Cartago</option>
<option>La Unión</option>
<option>Paraíso</option>
<option>Oreamuno</option>

</select>

<label>Cantidad paquetes</label>
<input type="number" id="cantidad" value="1">

<div class="resultado">

Precio por entrega: ₡ <span id="precio">0</span><br><br>

Total: ₡ <span id="total">0</span>

</div>

<a class="whatsapp" id="whatsappBtn" target="_blank">
Consultar por WhatsApp
</a>

<div class="formulario">

<h2>Enviar Paquete</h2>

<form id="formEnvio">

<input placeholder="Número de guía" id="guia" required>

<input placeholder="Cliente" id="cliente" required>

<input placeholder="Lugar de retiro" id="retiro" required>

<input placeholder="Teléfono" id="telefono" required>

<input placeholder="Email" id="email">

<input placeholder="Provincia" id="provincia" required>

<input placeholder="Cantón" id="cantonForm" required>

<input placeholder="Señas" id="senas">

<input placeholder="Ubicación digital (Google Maps)" id="ubicacion">

<input placeholder="Horario de entrega" id="horario">

<button type="submit">Enviar Pedido</button>

</form>

</div>

</div>

<script>

const precios={

"San José":2500,
"Montes de Oca":2500,
"Tibás":2500,
"Santa Ana":2500,
"Curridabat":3000,
"Goicoechea":3000,
"Moravia":3000,
"Escazú":3000,
"Alajuelita":3000,
"Desamparados":3000,
"Vázquez de Coronado":4000,
"Aserrí":4000,

"Heredia":2500,
"Flores":2500,
"Belén":2500,
"Santa Bárbara":2500,
"Barva":2500,
"San Pablo":2500,
"Santo Domingo":2500,
"San Rafael":2500,

"Alajuela":2500,
"Poás":3000,
"Grecia":4000,
"Sarchí":4000,
"Atenas":5000,
"Naranjo":5000,
"Palmares":5000,

"Cartago":4500,
"La Unión":4500,
"Paraíso":4500,
"Oreamuno":4500

};

function calcular(){

let canton=document.getElementById("canton").value;
let cantidad=parseInt(document.getElementById("cantidad").value)||0;

if(!canton)return;

let precio=precios[canton];

document.getElementById("precio").innerText=precio.toLocaleString();
document.getElementById("total").innerText=(precio*cantidad).toLocaleString();

document.getElementById("whatsappBtn").href="https://wa.me/50664541075?text=Hola%20Axis%20MC%20Logística,%20quiero%20cotizar%20"+cantidad+"%20envíos%20a%20"+canton;

document.getElementById("cantonForm").value=canton;

}

document.getElementById("canton").addEventListener("change",calcular);
document.getElementById("cantidad").addEventListener("input",calcular);

const scriptURL="https://script.google.com/macros/s/AKfycbyI66lTZDgHX_bEIyy54airPrUUHc0-CRWwob_fRvJYQg44VaDdamyG_pji1SQe_OI6/exec";

document.getElementById("formEnvio").addEventListener("submit",function(e){

e.preventDefault();

const data={

guia:document.getElementById("guia").value,
cliente:document.getElementById("cliente").value,
retiro:document.getElementById("retiro").value,
telefono:document.getElementById("telefono").value,
email:document.getElementById("email").value,
provincia:document.getElementById("provincia").value,
canton:document.getElementById("cantonForm").value,
senas:document.getElementById("senas").value,
ubicacion:document.getElementById("ubicacion").value,
horario:document.getElementById("horario").value

};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>{
alert("Pedido enviado correctamente");
document.getElementById("formEnvio").reset();
});

});

</script>

</body>
</html>
