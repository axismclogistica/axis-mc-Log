<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rastrear Envío - Axis MC Logística</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#0c0f14;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1f2937;
padding:40px;
border-radius:15px;
width:100%;
max-width:500px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

input{
width:100%;
padding:14px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
margin-top:15px;
padding:14px;
width:100%;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
}

.resultado{
margin-top:25px;
font-size:18px;
line-height:1.6;
}

.logo{
width:160px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="https://github.com/axismclogistica/axis-mc-logistica/blob/main/Logo%20Axismc.png?raw=true">

<h2>Rastrear envío</h2>

<input id="guia" placeholder="Ingrese su número de guía">

<button onclick="buscar()">Buscar guía</button>

<div id="resultado" class="resultado"></div>

</div>

<script>

async function buscar(){

let guia=document.getElementById("guia").value;

try{

let res = await fetch(
"https://script.google.com/macros/s/AKfycbyq37IakKTz-OwBV_91omUFEYs38vdZVOSX6Wt9a9aDIRYxoOye5arrDH79lbvFVePiEw/exec"+guia
);

let data = await res.json();

if(data.error){

document.getElementById("resultado").innerHTML="Guía no encontrada";

return;

}

document.getElementById("resultado").innerHTML=`

📦 <b>Guía:</b> ${data.guia}<br>
👤 <b>Cliente:</b> ${data.cliente}<br>
📍 <b>Provincia:</b> ${data.provincia}<br>
🏙️ <b>Cantón:</b> ${data.canton}<br>
🚚 <b>Estado:</b> ${data.estado}

`;

}

catch(e){

document.getElementById("resultado").innerHTML="Error consultando guía";

}

}

</script>

</body>

</html>
