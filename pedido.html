<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso de Pedido | Axis MC Logística</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#0c0f14;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#1f2937;
padding:40px;
border-radius:15px;
width:100%;
max-width:600px;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

.logo{
display:block;
text-align:center;
margin-bottom:20px;
padding:12px;
background:#111827;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:700;
font-size:18px;
}

.titulo{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-top:5px;
}

button{
margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<a href="cotizador.html" class="logo">
← Axis MC Logística
</a>

<h1 class="titulo">Ingreso de Pedido</h1>

<label>Cliente</label>
<input id="cliente" placeholder="Nombre del cliente">

<label>Teléfono</label>
<input id="telefono" placeholder="8888-8888">

<label>Provincia</label>
<input id="provincia" placeholder="Ej: San José">

<label>Cantón</label>
<input id="canton" placeholder="Ej: Escazú">

<label>Señas</label>
<input id="senas" placeholder="Ej: 200m norte del parque">

<label>Ubicación Google Maps o Waze (opcional)</label>
<input id="ubicacion" placeholder="Pegue el link">

<label>Horario de Entrega</label>
<input id="horario" placeholder="Ej: 2pm a 5pm">

<button onclick="enviarPedido()">Guardar Pedido</button>

</div>

<script>

function enviarPedido(){

let cliente=document.getElementById("cliente").value;
let telefono=document.getElementById("telefono").value;
let provincia=document.getElementById("provincia").value;
let canton=document.getElementById("canton").value;
let senas=document.getElementById("senas").value;
let ubicacion=document.getElementById("ubicacion").value;
let horario=document.getElementById("horario").value;

/* VALIDAR CAMPOS */

if(!cliente || !telefono || !provincia || !canton || !senas || !horario){

alert("Por favor complete todos los campos obligatorios");
return;

}

let data={

cliente:cliente,
telefono:telefono,
provincia:provincia,
canton:canton,
senas:senas,
ubicacion:ubicacion,
horario:horario

};

fetch("https://script.google.com/macros/s/AKfycbzVWKof1wJSdz2F5I0N0cbdZk0aGZxWJE-XkqidOPb5Glmpdm1648pLt6wcqkP1APzEEw/exec",{

method:"POST",
body:JSON.stringify(data)

})

.then(res=>res.json())
.then(res=>{

alert("Pedido guardado correctamente");

document.querySelectorAll("input").forEach(i=>i.value="");

})
.catch(error=>{

alert("Error al guardar pedido");
console.log(error);

});

}

</script>

</body>
</html>
