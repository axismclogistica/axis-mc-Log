<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso de Pedido | Axis MC Logística</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#0c0f14;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#1f2937;
padding:40px;
border-radius:15px;
width:100%;
max-width:600px;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

.titulo{
text-align:center;
margin-bottom:20px;
}

.logo{
display:block;
text-align:center;
margin-bottom:20px;
padding:12px;
background:#111827;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:700;
font-size:18px;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-top:5px;
}

button{
margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#1f2937;
padding:30px;
border-radius:12px;
max-width:400px;
width:90%;
text-align:center;
}

.popup-logo{
width:120px;
margin-bottom:10px;
}

.guia{
font-size:24px;
font-weight:700;
margin-bottom:10px;
color:#60a5fa;
}

.popup pre{
white-space:pre-wrap;
font-family:monospace;
text-align:left;
}

.popup-buttons{
margin-top:20px;
display:flex;
gap:10px;
}

.popup-buttons button{
flex:1;
}

</style>

</head>

<body>

<div class="container">

<a href="cotizador.html" class="logo">
← Axis MC Logística
</a>

<h1 class="titulo">Ingreso de Pedido</h1>

<label>Cliente</label>
<input id="cliente">

<label>Pedido de</label>
<input id="retiro">

<label>Teléfono</label>
<input id="telefono">

<label>Email</label>
<input id="email">

<label>Provincia</label>
<input id="provincia">

<label>Cantón</label>
<input id="canton">

<label>Señas</label>
<input id="senas">

<label>Ubicación Google Maps</label>
<input id="ubicacion">

<label>Horario de Entrega</label>
<input id="horario">

<button id="btnEnviar" onclick="enviarPedido()">
Guardar Pedido
</button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<img src="https://axismclogistica.github.io/logo.png" class="popup-logo">

<h3>Pedido Registrado</h3>

<div class="guia" id="numeroGuia"></div>

<pre id="popupTexto"></pre>

<div class="popup-buttons">

<button onclick="copiarInfo()">Copiar</button>

<button onclick="cerrarPopup()">Aceptar</button>

</div>

</div>

</div>

<script>

async function enviarPedido(){

let btn=document.getElementById("btnEnviar");

btn.innerText="Guardando...";
btn.disabled=true;

let data={

cliente:document.getElementById("cliente").value,
retiro:document.getElementById("retiro").value,
telefono:document.getElementById("telefono").value,
email:document.getElementById("email").value,
provincia:document.getElementById("provincia").value,
canton:document.getElementById("canton").value,
senas:document.getElementById("senas").value,
ubicacion:document.getElementById("ubicacion").value,
horario:document.getElementById("horario").value

};

try{

let res=await fetch(
"https://script.google.com/macros/s/AKfycbwJKJHPXMAgTLPp8U-Fch9vd-ysd0eugz7k7p9daYCU1eXqzAYfCV5OO7n07WXajQkDtA/exec",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

let json=await res.json();

document.getElementById("numeroGuia").innerText=
"Guía: "+json.guia;

let info=

`Cliente: ${data.cliente}

Teléfono: ${data.telefono}

Provincia: ${data.provincia}
Cantón: ${data.canton}

Señas:
${data.senas}

Ubicación:
${data.ubicacion}

Horario:
${data.horario}`;

document.getElementById("popupTexto").innerText=info;

document.getElementById("popup").style.display="flex";

btn.innerText="Guardar Pedido";
btn.disabled=false;

document.querySelectorAll("input").forEach(i=>i.value="");

}catch(err){

alert("Error al guardar pedido");

btn.innerText="Guardar Pedido";
btn.disabled=false;

}

}

function cerrarPopup(){

document.getElementById("popup").style.display="none";

}

function copiarInfo(){

let texto=document.getElementById("popupTexto").innerText;

navigator.clipboard.writeText(texto);

alert("Información copiada");

}

</script>

</body>
</html>
